name: Test and deployment vom Taschenrechner

on: push

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            
            - name: checkout
              uses: actions/checkout@v6

            - name: install node
              uses: actions/setup-node@v6
              with:
                  node-version: "20"
            
            - name: install dependencies & test
              run: |
                  cd testing-example
                  npm install
                  npm test
    
    deploy:
        runs-on: ubuntu-latest
        needs: test
        steps:
            - name: checkout
              uses: actions/checkout@v6