name: staging workflow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Post a message in a channel
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "Staging Pipeline wurde gestartet von ${{github.actor}}. Pipeline : ${{github.workflow}}"

      - name: checkout
        uses: actions/checkout@v6

      - name: ssh setup
        run: |
          mkdir -p ~/.ssh
          echo "${{secrets.SSH_PRIVATE_KEY_STAGING}}" > ~/.ssh/deploy_key_staging
          chmod 400 ~/.ssh/deploy_key_staging
          ssh-keyscan -H ${{secrets.EC2_IP_STAGING}}  >> ~/.ssh/known_hosts

      - name: install nginx
        run: |
          ssh -i ~/.ssh/deploy_key_staging ubuntu@${{secrets.EC2_IP_STAGING}} "sudo apt update && sudo apt install nginx -y"

      - name: deploy website
        run: |
          scp -i ~/.ssh/deploy_key_staging frontend/index.html ubuntu@${{secrets.EC2_IP_STAGING}}:/home/ubuntu/index.html
          ssh -i ~/.ssh/deploy_key_staging ubuntu@${{secrets.EC2_IP_STAGING}} "sudo cp /home/ubuntu/index.html /var/www/html/index.html"

      - name: Post a message in a channel bei Erfolg!
        if: ${{ success() }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "Staging Deployment erfolgreich!"

      # Would also try to send a failed webhook, if previous webhook to slack failed so maybe there is better logic?
      - name: Post a message in a channel bei Fehlschlag!
        if: ${{ failure() }}
        uses: slackapi/slack-github-action@v3.0.3
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "Staging Deployment nicht erfolgreich!"
